<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h4>Cercador d'Smartphones</h4>
    <label>Marca:</label>
    <input list="marca" type="text">
    <datalist id="marca">
        <option value="Xiaomi">
        <option value="Samsung">
        <option value="iPhone">
        <option value="RealMe">
        <option value="Motorola">
    </datalist>
    <br><br>
    <label>Preu:</label>
    <select>
        <option value="0-200">Menys de 200€</option>
        <option value="200-300">200 - 300€</option>
        <option value="300-400">300 - 400€</option>
        <option value="400-600">400 - 600€</option>
        <option value="600-2000">600€ o més</option>
    </select>
    <br><br><br>
    <button type="submit">Cercar</button>
</body>

</html>
