<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulari de contacte</title>
</head>

<body>
    <header>
        <a href="index.html">Portafoli</a>
    </header>

    <div class="principal">
        <aside>
            <h1>Índex</h1>
            <a href="index.html">Inici</a><br />
            <a href="activitats/activitats.html">Activitats</a><br />
            <a href="formulari.html">Formulari de contacte</a><br />
            <a href="wireframes/index.html">Wireframes</a>
            <a href="mesinformacio.html">Més informació</a><br />
        </aside>
        <div class="contingut">
            <h1>Formulari de contacte</h1>

            <form>
                <span>Informació de contacte</span>
                <br />
                <label for="nom">Nom</label>
                <input type="text" name="nom" placeholder="Nom">
                <br />
                <label for="email">Correu electrònic</label>
                <input type="text" name="email" placeholder="exemple@gmail.com">
                <br />

                <label for="telf">Telèfon</label>
                <input type="text" maxlength="9" name="telf" placeholder="Telèfon">
                <br />
                <span>Motiu de contacte</span>
                <br />
                <input type="text" name="assumpte" placeholder="Assumpte">
                <br />
                <textarea id="missatge" name="missatge" placeholder="Escriu aquí el teu missatge..." rows="8"
                    cols="40"></textarea>
                <br />
                <input type="submit" value="Enviar consulta">
            </form>
        </div>
    </div>
    <footer>
        <div class="social">
            <a href="#"><img src="imatges/gmail.svg" alt="gmail"></a>
            <a href="#"><img src="imatges/ld.svg" alt="linkedin"></a>
            <a href="#"><img src="imatges/f.svg" alt="facebook"> </a>
            <a href="#"><img src="imatges/t.svg" alt="twitter"></a>
        </div>
        <p>&copy; Júlia DAW </p>
    </footer>
</body>

</html>
